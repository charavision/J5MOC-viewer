<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LEGO Modell Viewer</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js">
</script>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #d9d9d9;
}

model-viewer {
    width: 100vw;
    height: 100vh;
}
</style>
</head>

<body>

<model-viewer
    src="Untitled.glb"
    alt="LEGO Modell"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    camera-orbit="0deg 75deg auto"
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">
</model-viewer>

</body>
</html>
