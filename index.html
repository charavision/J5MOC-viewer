<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>J5MOC Viewer</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js">
</script>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #d9d9d9;
}

model-viewer {
    width: 100vw;
    height: 100vh;
}

.instructions-button {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);

    padding: 12px 28px;

    background: rgba(255,255,255,0.20);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.40);
    border-radius: 999px;

    color: #ffffff;
    text-decoration: none;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    font-weight: 600;

    transition: all 0.2s ease;
    z-index: 1000;
}

.instructions-button:hover {
    background: rgba(255,255,255,0.35);
    transform: translateX(-50%) scale(1.05);
}
</style>
</head>

<body>

<model-viewer
    src="Untitled.glb"
    alt="LEGO Modell"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    camera-orbit="0deg 75deg auto"
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">
</model-viewer>

<a
    class="instructions-button"
    href="https://reb.li/m/209065"
    target="_blank"
    rel="noopener noreferrer">
    Instructions
</a>

</body>
</html>
